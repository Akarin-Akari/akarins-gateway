<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akarin's Gateway — Panel</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Alpine.js CDN -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- SortableJS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>

    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Custom Styles -->
    <link rel="stylesheet" href="/panel/static/css/panel.css">

    <!-- Custom JS -->
    <script src="/panel/static/js/sortable-helpers.js"></script>
    <script src="/panel/static/js/i18n.js"></script>
    <script src="/panel/static/js/panel.js"></script>
</head>

<body x-data :class="{ 'theme-terminal': $store.panel.theme === 'terminal' }" x-init="$store.panel.tryRestoreSession()">
<!-- ==================== LOGIN PAGE ==================== -->
<template x-if="!$store.panel.authenticated">
<div class="login-container">
    <div class="login-box glass-card">
        <h1 x-text="$store.i18n.t('login.title')"></h1>
        <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1.5rem;" x-text="$store.i18n.t('login.subtitle')"></p>

        <div x-data="{ password: '' }">
            <input
                type="password"
                class="input-field"
                :placeholder="$store.i18n.t('login.placeholder')"
                x-model="password"
                @keydown.enter="$store.panel.login(password)"
                autofocus
            >
            <template x-if="$store.panel.loginError">
                <p style="color: var(--accent-red); font-size: 0.8rem; margin-top: 0.5rem;"
                   x-text="$store.panel.loginError"></p>
            </template>
            <button
                class="btn-primary"
                style="width: 100%; margin-top: 1rem;"
                @click="$store.panel.login(password)"
                :disabled="$store.panel.loginLoading"
            >
                <span x-show="!$store.panel.loginLoading" x-text="$store.i18n.t('login.signin')"></span>
                <span x-show="$store.panel.loginLoading" x-text="$store.i18n.t('login.authenticating')"></span>
            </button>
        </div>
    </div>
</div>
</template>

<!-- ==================== MAIN DASHBOARD ==================== -->
<template x-if="$store.panel.authenticated">
<div style="position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 1.5rem;">

    <!-- Header -->
    <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
        <div>
            <h1 style="font-size: 1.25rem; font-weight: 600; margin: 0;" x-text="$store.i18n.t('header.title')"></h1>
            <p style="color: var(--text-muted); font-size: 0.8rem; margin: 0;" x-text="$store.i18n.t('header.subtitle')"></p>
        </div>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
            <!-- Theme Switcher -->
            <button class="btn-ghost" style="padding: 4px; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; font-size: 1rem;"
                    @click="$store.panel.toggleTheme()"
                    :title="$store.panel.theme === 'glass' ? 'Switch to Terminal Theme' : 'Switch to Glass Theme'">
                <span x-show="$store.panel.theme === 'glass'">💻</span>
                <span x-show="$store.panel.theme === 'terminal'">✨</span>
            </button>

            <!-- Language Switcher -->
            <div style="display: flex; gap: 2px; background: var(--bg-input); border-radius: 6px; padding: 2px; border: 1px solid var(--border-subtle);">
                <button style="padding: 2px 8px; font-size: 0.7rem; border: none; border-radius: 4px; cursor: pointer; transition: all 0.2s;"
                        :style="$store.i18n.isEn ? 'background: var(--accent-blue); color: white;' : 'background: transparent; color: var(--text-muted);'"
                        @click="$store.i18n.setLocale('en')">EN</button>
                <button style="padding: 2px 8px; font-size: 0.7rem; border: none; border-radius: 4px; cursor: pointer; transition: all 0.2s;"
                        :style="$store.i18n.isZh ? 'background: var(--accent-blue); color: white;' : 'background: transparent; color: var(--text-muted);'"
                        @click="$store.i18n.setLocale('zh')">中文</button>
            </div>
            <button class="btn-ghost" @click="$store.panel.saveConfig()" :disabled="$store.panel.loading">
                <span x-show="!$store.panel.loading" x-text="$store.i18n.t('header.save')"></span>
                <span x-show="$store.panel.loading" x-text="$store.i18n.t('header.saving')"></span>
            </button>
            <button class="btn-ghost" @click="$store.panel.logout()" x-text="$store.i18n.t('header.logout')"></button>
        </div>
    </div>

    <!-- Tab Bar -->
    <div class="tab-bar">
        <button class="tab-btn" :class="{ active: $store.panel.activeTab === 'backends' }"
                @click="$store.panel.activeTab = 'backends'" x-text="$store.i18n.t('tab.backends')">
        </button>
        <button class="tab-btn" :class="{ active: $store.panel.activeTab === 'routing' }"
                @click="$store.panel.activeTab = 'routing'" x-text="$store.i18n.t('tab.routing')">
        </button>
        <button class="tab-btn" :class="{ active: $store.panel.activeTab === 'health' }"
                @click="$store.panel.activeTab = 'health'" x-text="$store.i18n.t('tab.health')">
        </button>
        <button class="tab-btn" :class="{ active: $store.panel.activeTab === 'clients' }"
                @click="$store.panel.activeTab = 'clients'" x-text="$store.i18n.t('tab.clients')">
        </button>
    </div>

    <!-- ==================== TAB 1: BACKENDS ==================== -->
    <div x-show="$store.panel.activeTab === 'backends'" x-cloak>
        <div id="backend-list"
             x-init="$nextTick(() => initBackendSortable('backend-list', (order) => $store.panel.reorderBackends(order)))">

            <template x-for="b in $store.panel.backends" :key="b.key">
                <div class="glass-card backend-card" :data-key="b.key">
                    <!-- Card Header -->
                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                        <!-- Drag Handle -->
                        <span class="drag-handle" :title="$store.i18n.t('backends.drag_reorder')">&#x2261;</span>

                        <!-- Name & URL -->
                        <div style="flex: 1; min-width: 0;">
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                <span style="font-weight: 600; font-size: 0.9rem;" x-text="b.name"></span>
                                <span style="color: var(--text-muted); font-size: 0.7rem;"
                                      x-text="'P:' + b.priority"></span>
                            </div>
                            <div style="color: var(--text-muted); font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"
                                 x-text="b.base_url"></div>
                        </div>

                        <!-- Circuit Breaker Status -->
                        <div style="display: flex; align-items: center; gap: 0.35rem; font-size: 0.75rem; color: var(--text-secondary);">
                            <span>CB:</span>
                            <span class="status-dot" :class="b.circuit_breaker.state"></span>
                            <span x-text="$store.panel.cbStateLabel(b.circuit_breaker.state)"></span>
                        </div>

                        <!-- SCID Toggle -->
                        <div style="display: flex; align-items: center; gap: 0.25rem; font-size: 0.7rem; color: var(--text-muted);"
                             title="SCID Feature">
                            <span>SCID</span>
                            <label class="toggle" style="width: 32px; height: 18px;">
                                <input type="checkbox" :checked="b.scid_enabled"
                                       @change="$store.panel.toggleScid(b.key)">
                                <span class="slider" style="--toggle-size: 12px;"></span>
                            </label>
                        </div>

                        <!-- Enable Toggle -->
                        <label class="toggle">
                            <input type="checkbox" :checked="b.enabled"
                                   @change="$store.panel.toggleBackend(b.key)">
                            <span class="slider"></span>
                        </label>

                        <!-- Expand Button -->
                        <button class="btn-ghost" style="padding: 0.3rem 0.5rem; font-size: 0.75rem;"
                                @click="$store.panel.toggleExpand(b.key)">
                            <span x-text="$store.panel.expandedBackend === b.key ? '▲' : '▼'"></span>
                        </button>
                    </div>

                    <!-- Expanded Details -->
                    <div class="expand-section" :class="{ open: $store.panel.expandedBackend === b.key }">
                        <div style="border-top: 1px solid var(--border-subtle); padding-top: 1rem; display: grid; gap: 0.75rem;">

                            <!-- Endpoint URL -->
                            <div>
                                <label style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 0.25rem;" x-text="$store.i18n.t('backends.endpoint')"></label>
                                <div style="display: flex; gap: 0.5rem;">
                                    <input class="input-field" style="flex:1" :value="b.base_url"
                                           @change="$store.panel.updateBackend(b.key, { base_url: $event.target.value })">
                                </div>
                            </div>

                            <!-- Timeout Fields -->
                            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem;">
                                <div>
                                    <label style="font-size: 0.7rem; color: var(--text-muted);" x-text="$store.i18n.t('backends.timeout')"></label>
                                    <input class="input-field" type="number" :value="b.timeout"
                                           @change="$store.panel.updateBackend(b.key, { timeout: parseFloat($event.target.value) })">
                                </div>
                                <div>
                                    <label style="font-size: 0.7rem; color: var(--text-muted);" x-text="$store.i18n.t('backends.stream_timeout')"></label>
                                    <input class="input-field" type="number" :value="b.stream_timeout"
                                           @change="$store.panel.updateBackend(b.key, { stream_timeout: parseFloat($event.target.value) })">
                                </div>
                                <div>
                                    <label style="font-size: 0.7rem; color: var(--text-muted);" x-text="$store.i18n.t('backends.max_retries')"></label>
                                    <input class="input-field" type="number" :value="b.max_retries"
                                           @change="$store.panel.updateBackend(b.key, { max_retries: parseInt($event.target.value) })">
                                </div>
                            </div>

                            <!-- API Keys -->
                            <div>
                                <label style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 0.35rem;">
                                    <span x-text="$store.i18n.t('backends.api_keys')"></span> (<span x-text="b.api_keys_count"></span>)
                                </label>
                                <div style="display: flex; flex-wrap: wrap; gap: 0.35rem; margin-bottom: 0.5rem;">
                                    <template x-for="(mk, idx) in b.api_keys_masked" :key="idx">
                                        <span class="key-pill">
                                            <span x-text="mk"></span>
                                            <button style="background:none;border:none;color:var(--accent-red);cursor:pointer;font-size:0.85rem;padding:0;"
                                                    @click="$store.panel.deleteApiKey(b.key, idx)"
                                                    :title="$store.i18n.t('backends.remove_key')">&times;</button>
                                        </span>
                                    </template>
                                </div>
                                <div style="display: flex; gap: 0.5rem;">
                                    <input class="input-field" style="flex:1" placeholder="sk-..."
                                           x-model="$store.panel.newKeyInput"
                                           @keydown.enter="$store.panel.addApiKey(b.key)">
                                    <button class="btn-ghost" @click="$store.panel.addApiKey(b.key)" x-text="$store.i18n.t('backends.add_key')"></button>
                                </div>
                            </div>

                            <!-- Supported Models -->
                            <div>
                                <label style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 0.25rem;" x-text="$store.i18n.t('backends.supported_models')"></label>
                                <div style="display: flex; flex-wrap: wrap; gap: 0.25rem;">
                                    <template x-for="m in b.supported_models" :key="m">
                                        <span style="font-size: 0.7rem; padding: 0.15rem 0.4rem; background: var(--bg-input); border: 1px solid var(--border-subtle); border-radius: 4px; color: var(--text-secondary);"
                                              x-text="m"></span>
                                    </template>
                                    <span x-show="!b.supported_models || b.supported_models.length === 0"
                                          style="font-size: 0.7rem; color: var(--text-muted);" x-text="$store.i18n.t('backends.all_models')"></span>
                                </div>
                            </div>

                            <!-- Circuit Breaker Reset -->
                            <div style="display: flex; align-items: center; justify-content: space-between;">
                                <div style="font-size: 0.75rem; color: var(--text-muted);">
                                    <span x-text="$store.i18n.t('backends.circuit_breaker')"></span>
                                    <span class="status-dot" :class="b.circuit_breaker.state" style="margin-left: 0.25rem;"></span>
                                    <span x-text="$store.panel.cbStateLabel(b.circuit_breaker.state)"></span>
                                    <span x-show="b.circuit_breaker.remaining_timeout > 0"
                                          x-text="'(' + b.circuit_breaker.remaining_timeout + 's remaining)'"></span>
                                </div>
                                <button class="btn-ghost btn-danger" style="font-size: 0.7rem;"
                                        @click="$store.panel.resetCircuitBreaker(b.key)"
                                        x-show="b.circuit_breaker.state !== 'closed'"
                                        x-text="$store.i18n.t('backends.reset_cb')">
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- Add Backend Button / Form -->
        <div style="margin-top: 1rem;">
            <button class="btn-ghost" style="width: 100%; padding: 0.75rem; font-size: 0.85rem; border: 2px dashed var(--border-subtle); border-radius: 12px;"
                    x-show="!$store.panel.showAddBackendForm"
                    @click="$store.panel.showAddBackendForm = true"
                    x-text="$store.i18n.t('backends.add_backend')">
            </button>

            <!-- Collapsible Add Backend Form -->
            <div class="glass-card" style="padding: 1.25rem;"
                 x-show="$store.panel.showAddBackendForm"
                 x-transition>
                <h3 style="font-size: 0.95rem; font-weight: 600; margin: 0 0 1rem 0;" x-text="$store.i18n.t('backends.add_backend_title')"></h3>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                    <!-- Key -->
                    <div>
                        <label style="font-size: 0.7rem; color: var(--text-muted); display: block; margin-bottom: 0.25rem;" x-text="$store.i18n.t('backends.key')"></label>
                        <input class="input-field" x-model="$store.panel.newBackend.key" placeholder="my-backend">
                    </div>
                    <!-- Name -->
                    <div>
                        <label style="font-size: 0.7rem; color: var(--text-muted); display: block; margin-bottom: 0.25rem;" x-text="$store.i18n.t('backends.name')"></label>
                        <input class="input-field" x-model="$store.panel.newBackend.name" placeholder="My Backend">
                    </div>
                    <!-- Base URL (full width) -->
                    <div style="grid-column: 1 / -1;">
                        <label style="font-size: 0.7rem; color: var(--text-muted); display: block; margin-bottom: 0.25rem;" x-text="$store.i18n.t('backends.base_url')"></label>
                        <input class="input-field" x-model="$store.panel.newBackend.base_url" placeholder="http://localhost:8080/v1">
                    </div>
                    <!-- Priority -->
                    <div>
                        <label style="font-size: 0.7rem; color: var(--text-muted); display: block; margin-bottom: 0.25rem;" x-text="$store.i18n.t('backends.priority')"></label>
                        <input class="input-field" type="number" x-model="$store.panel.newBackend.priority">
                    </div>
                    <!-- API Format -->
                    <div>
                        <label style="font-size: 0.7rem; color: var(--text-muted); display: block; margin-bottom: 0.25rem;" x-text="$store.i18n.t('backends.api_format')"></label>
                        <select class="input-field" x-model="$store.panel.newBackend.api_format">
                            <option value="openai">OpenAI</option>
                            <option value="anthropic">Anthropic</option>
                            <option value="custom">Custom</option>
                        </select>
                    </div>
                    <!-- Timeout -->
                    <div>
                        <label style="font-size: 0.7rem; color: var(--text-muted); display: block; margin-bottom: 0.25rem;" x-text="$store.i18n.t('backends.timeout')"></label>
                        <input class="input-field" type="number" x-model="$store.panel.newBackend.timeout">
                    </div>
                    <!-- Stream Timeout -->
                    <div>
                        <label style="font-size: 0.7rem; color: var(--text-muted); display: block; margin-bottom: 0.25rem;" x-text="$store.i18n.t('backends.stream_timeout')"></label>
                        <input class="input-field" type="number" x-model="$store.panel.newBackend.stream_timeout">
                    </div>
                    <!-- Max Retries -->
                    <div>
                        <label style="font-size: 0.7rem; color: var(--text-muted); display: block; margin-bottom: 0.25rem;" x-text="$store.i18n.t('backends.max_retries')"></label>
                        <input class="input-field" type="number" x-model="$store.panel.newBackend.max_retries">
                    </div>
                    <!-- Enabled -->
                    <div style="display: flex; align-items: flex-end;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: var(--text-secondary); cursor: pointer;">
                            <input type="checkbox" x-model="$store.panel.newBackend.enabled">
                            <span x-text="$store.i18n.t('backends.enabled')"></span>
                        </label>
                    </div>
                </div>

                <!-- Actions -->
                <div style="display: flex; gap: 0.5rem; margin-top: 1rem; justify-content: flex-end;">
                    <button class="btn-ghost" @click="$store.panel.resetNewBackendForm()" x-text="$store.i18n.t('backends.cancel')"></button>
                    <button class="btn-primary" @click="$store.panel.addBackend()" x-text="$store.i18n.t('backends.submit')"></button>
                </div>
            </div>
        </div>
    </div>

    <!-- ==================== TAB 2: MODEL ROUTING ==================== -->
    <div x-show="$store.panel.activeTab === 'routing'" x-cloak>
        <div style="display: grid; grid-template-columns: 220px 1fr; gap: 1rem; min-height: 400px;">

            <!-- Model List -->
            <div class="glass-card" style="padding: 0.75rem; overflow-y: auto; max-height: 600px;">
                <div style="font-size: 0.75rem; color: var(--text-muted); padding: 0.25rem 0.5rem; margin-bottom: 0.5rem;">
                    <span x-text="$store.i18n.t('routing.models')"></span> (<span x-text="$store.panel.routingModels.length"></span>)
                </div>
                <template x-for="m in $store.panel.routingModels" :key="m">
                    <div class="model-item"
                         :class="{ active: $store.panel.selectedModel === m }"
                         @click="$store.panel.selectedModel = m"
                         x-text="m"></div>
                </template>

                <!-- Add Model -->
                <div style="margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border-subtle);"
                     x-data="{ newModel: '' }">
                    <input class="input-field" style="font-size: 0.8rem; margin-bottom: 0.35rem;"
                           :placeholder="$store.i18n.t('routing.model_placeholder')"
                           x-model="newModel"
                           @keydown.enter="if(newModel.trim()){$store.panel.addModel(newModel.trim()); newModel='';}">
                    <button class="btn-ghost" style="width: 100%; font-size: 0.75rem;"
                            @click="if(newModel.trim()){$store.panel.addModel(newModel.trim()); newModel='';}"
                            x-text="$store.i18n.t('routing.add_model')">
                    </button>
                </div>
            </div>

            <!-- Fallback Chain Editor -->
            <div class="glass-card" style="padding: 1.25rem;">
                <template x-if="$store.panel.selectedRule">
                    <div>
                        <h3 style="font-size: 1rem; font-weight: 600; margin: 0 0 0.25rem 0;"
                            x-text="$store.panel.selectedModel"></h3>
                        <p style="font-size: 0.75rem; color: var(--text-muted); margin: 0 0 1rem 0;" x-text="$store.i18n.t('routing.fallback_chain')"></p>

                        <!-- Chain Nodes -->
                        <div id="chain-editor"
                             x-effect="initChainSortable('chain-editor', $store.panel.selectedModel, (newChain) => $store.panel.reorderChain($store.panel.selectedModel, newChain))">
                            <template x-for="(entry, idx) in $store.panel.selectedRule.backend_chain" :key="entry.backend + ':' + entry.model">
                                <div class="chain-item" :data-backend="entry.backend" :data-model="entry.model"
                                     style="margin-bottom: 0.5rem;">
                                    <div class="chain-node">
                                        <span class="drag-handle">&#x2261;</span>
                                        <span style="font-weight: 500;" x-text="entry.backend"></span>
                                        <template x-if="entry.model !== $store.panel.selectedModel">
                                            <span style="color: var(--accent-purple); font-size: 0.75rem;"
                                                  x-text="'/ ' + entry.model"></span>
                                        </template>
                                        <div style="margin-left: auto; display: flex; align-items: center; gap: 0.5rem;">
                                            <button class="btn-move" :disabled="idx === 0"
                                                    @click="$store.panel.moveChainNode($store.panel.selectedModel, idx, -1)">&uarr;</button>
                                            <button class="btn-move"
                                                    :disabled="idx === $store.panel.selectedRule.backend_chain.length - 1"
                                                    @click="$store.panel.moveChainNode($store.panel.selectedModel, idx, 1)">&darr;</button>
                                            <button style="background: none; border: none; color: var(--accent-red); cursor: pointer; font-size: 0.9rem; padding: 0;"
                                                    @click="$store.panel.removeChainNode($store.panel.selectedModel, idx)"
                                                    title="Remove node">&times;</button>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <!-- Add Chain Node -->
                        <div style="margin-top: 0.75rem; display: flex; gap: 0.5rem;"
                             x-data="{ addBackend: '', addModel: '' }">
                            <input class="input-field" style="flex: 1; font-size: 0.8rem;"
                                   :placeholder="$store.i18n.t('routing.backend_key_placeholder')"
                                   x-model="addBackend">
                            <input class="input-field" style="flex: 1; font-size: 0.8rem;"
                                   :placeholder="$store.i18n.t('routing.target_model_placeholder')"
                                   x-model="addModel">
                            <button class="btn-ghost" style="font-size: 0.75rem; white-space: nowrap;"
                                    @click="if(addBackend.trim()){$store.panel.addChainNode($store.panel.selectedModel, addBackend.trim(), addModel.trim()); addBackend=''; addModel='';}"
                                    x-text="$store.i18n.t('routing.add')">
                            </button>
                        </div>

                        <!-- Fallback Conditions -->
                        <div style="margin-top: 1.25rem;">
                            <label style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-bottom: 0.5rem;"
                                   x-text="$store.i18n.t('routing.fallback_on')">
                            </label>
                            <div style="display: flex; flex-wrap: wrap; gap: 0.35rem;">
                                <template x-for="code in [400, 401, 403, 429, 500, 502, 503, 504, 529, 'timeout', 'connection_error', 'unavailable']" :key="code">
                                    <span class="fallback-badge"
                                          :class="{ active: $store.panel.isFallbackActive($store.panel.selectedModel, code) }"
                                          @click="$store.panel.toggleFallbackCondition($store.panel.selectedModel, code)"
                                          x-text="code"></span>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
                <template x-if="!$store.panel.selectedRule">
                    <div style="display: flex; align-items: center; justify-content: center; height: 200px; color: var(--text-muted); font-size: 0.85rem;"
                         x-text="$store.i18n.t('routing.select_model')">
                    </div>

                                <span x-text="$store.panel.cbStateLabel(info.circuit_breaker.state)"></span>
                            </div>
                            <button class="btn-ghost btn-danger" style="font-size: 0.65rem; padding: 0.2rem 0.5rem;"
                                    @click="$store.panel.resetCircuitBreaker(key)"
                                    x-show="info.circuit_breaker.state !== 'closed'">
                                Reset
                            </button>
                        </div>
                    </div>
                </template>
            </div>
        </div>
        </template>

        <template x-if="!$store.panel.healthData">
            <div style="text-align: center; padding: 3rem; color: var(--text-muted);" x-text="$store.i18n.t('health.loading')"></div>
        </template>
    </div>

    <!-- ==================== TAB 4: CLIENT SETTINGS ==================== -->
    <div x-show="$store.panel.activeTab === 'clients'" x-cloak>
        <div style="margin-bottom: 1rem;">
            <p style="color: var(--text-muted); font-size: 0.8rem;"
               x-text="$store.i18n.t('clients.desc')">
            </p>
        </div>

        <!-- Feature Legend -->
        <div class="glass-card" style="padding: 0.75rem 1rem; margin-bottom: 1rem;">
            <div style="display: flex; flex-wrap: wrap; gap: 1rem; font-size: 0.75rem;">
                <template x-for="feat in Object.keys($store.panel.clientFeatureDescriptions)" :key="feat">
                    <div style="display: flex; align-items: center; gap: 0.35rem;">
                        <span style="font-weight: 600; color: var(--accent-purple);" x-text="$store.panel.featureLabel(feat)"></span>
                        <span style="color: var(--text-muted);" x-text="'— ' + $store.panel.clientFeatureDescriptions[feat]"></span>
                    </div>
                </template>
            </div>
        </div>

        <!-- Client Cards Grid -->
        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 0.75rem;">
            <template x-for="ct in $store.panel.clientTypes" :key="ct">
                <div class="glass-card" style="padding: 1rem 1.25rem;">
                    <!-- Client Header -->
                    <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.75rem;">
                        <span style="font-size: 1.1rem;" x-text="$store.panel.clientIcon(ct)"></span>
                        <div>
                            <div style="font-weight: 600; font-size: 0.9rem;" x-text="$store.panel.getClientDisplayName(ct)"></div>
                            <div style="font-size: 0.7rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace;" x-text="ct"></div>
                        </div>
                    </div>

                    <!-- Feature Toggles -->
                    <div style="display: grid; gap: 0.5rem;">
                        <template x-for="feat in ['scid', 'sanitization', 'cross_pool_fallback', 'stateless', 'signature_recovery_only']" :key="feat">
                            <div style="display: flex; align-items: center; justify-content: space-between; padding: 0.35rem 0;">
                                <div style="display: flex; align-items: center; gap: 0.5rem;">
                                    <span style="font-size: 0.8rem; color: var(--text-secondary); min-width: 90px;"
                                          x-text="$store.panel.featureLabel(feat)"></span>
                                </div>
                                <label class="toggle">
                                    <input type="checkbox"
                                           :checked="$store.panel.isClientFeatureEnabled(ct, feat)"
                                           @change="$store.panel.toggleClientFeature(ct, feat)">
                                    <span class="slider"></span>
                                </label>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>
    </div>

</div>
</template>

<!-- Save Banner -->
<div class="save-banner"
     :class="{ show: $store.panel.saveBanner.show, [$store.panel.saveBanner.type]: true }"
     x-text="$store.panel.saveBanner.message">
</div>

</body>
</html>
