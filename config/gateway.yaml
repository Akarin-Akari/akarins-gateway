      # 6. Antigravity Tools - Claude Opus 4.5
      - backend: antigravity-tools
        model: claude-opus-4.5
      # 7. Ruoli API - Claude Opus 4.5
      - backend: ruoli
        model: claude-opus-4.5
      # [DISABLED 2026-02-15] DKAPI/Cifang API Keys 已失效
      # - backend: dkapi
      #   model: claude-opus-4.5
      # - backend: cifang
      #   model: claude-opus-4.5
      # 8. AnyRouter - Claude Opus 4.5
      - backend: anyrouter
        model: claude-opus-4.5
      # [REMOVED 2026-02-26] Kiro Gateway 不支持 Opus，已从降级链移除
      # 10. Copilot - 先尝试 Opus 4.6（已支持）
