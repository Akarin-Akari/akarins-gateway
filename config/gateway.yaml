# Gateway 后端配置
#
# 配置说明：
# - enabled: 是否启用该后端（支持环境变量替换）
# - priority: 优先级（数字越小优先级越高）
# - base_url: 后端服务地址
# - models: 支持的模型列表（"*" 表示支持所有模型）
# - timeout: 普通请求超时时间（秒）
# - stream_timeout: 流式请求超时时间（秒）
# - max_retries: 最大重试次数
#
# 环境变量替换语法：${VAR_NAME:default_value}
# 例如：${COPILOT_ENABLED:true} 表示从环境变量 COPILOT_ENABLED 读取，默认值为 true

backends:
  # ==================== [NEW 2026-02-20] ZeroGravity MITM Proxy ====================
  # ZeroGravity: Rust-based MITM proxy using official Antigravity LS binary
  # Highest priority — traffic fingerprint indistinguishable from real Antigravity
  # Headless mode: standalone LS + HTTPS_PROXY MITM, no Antigravity app needed
  zerogravity:
    enabled: ${ZEROGRAVITY_ENABLED:true}
    priority: 0  # 最高优先级：流量指纹不可区分
    base_url: ${ZEROGRAVITY_BASE_URL:http://127.0.0.1:8880/v1}
    api_format: openai  # ZG exposes OpenAI-compatible API
    models:
      # Claude 4.6 series
      - claude-opus-4.6
      - claude-opus-4-6
      - claude-sonnet-4.6
      - claude-sonnet-4-6
      # Gemini 3.1 Pro series (upstream v1.2.0 — replaces sunset gemini-3-pro)
      - gemini-3.1-pro
      - gemini-3.1-pro-high
      - gemini-3.1-pro-low
      # Gemini 3 Flash
      - gemini-3-flash
    timeout: 120
    stream_timeout: 600
    max_retries: 2
  # ===========================================================================

  # Antigravity 后端 - 支持 Claude、Gemini 等模型
  # [FIX 2026-02-28] Cluster mode: gcli2api on port 7862 as antigravity backend
  # Set ANTIGRAVITY_ENABLED=false for standalone mode (no gcli2api dependency)
  gcli2api-antigravity:
    enabled: ${ANTIGRAVITY_ENABLED:true}
    priority: 1
    base_url: ${ANTIGRAVITY_BASE_URL:http://127.0.0.1:7862/antigravity/v1}
    models: ["*"]  # 支持所有模型
    timeout: 60
    stream_timeout: 300
    max_retries: 2

  # ==================== [NEW 2026-02-06] Antigravity Tools ====================
  # Antigravity Tools 作为自研 Antigravity 的 fallback
  # 当自研后端凭证不可用时（完整降级条件），自动降级到这里
  # ⚠️ Disabled: standalone mode — no antigravity-tools (port 9046) dependency
  antigravity-tools:
    enabled: ${ANTIGRAVITY_TOOLS_ENABLED:false}
    priority: 1.5  # 在 gcli2api-antigravity (1) 之后，kiro-gateway (2) 之前
    base_url: ${ANTIGRAVITY_TOOLS_BASE_URL:http://127.0.0.1:9046/v1}
    api_format: anthropic  # 使用 Anthropic Messages 格式
    endpoint_suffix: "?beta=true"  # 特殊端点后缀
    # 支持的模型列表（与自研 gcli2api-antigravity 一致：Gemini + Claude 系列）
    models:
      # Claude 4.5 系列（主要目标）
      - claude-opus-4.5
      - claude-sonnet-4.5
      # Gemini 系列
      - gemini-2.5-pro
      - gemini-2.5-flash
      - gemini-3-pro
      - gemini-3-pro-high
      - gemini-3-flash
      # GPT 系列
      - gpt-4
      - gpt-4o
      - gpt-5
      - gpt-5.1
      - gpt-5.2
    timeout: 120
    stream_timeout: 600
    max_retries: 2
  # ===========================================================================

  # Copilot 后端 - 支持 GPT、O1、O3 等 OpenAI 模型
  copilot:
    enabled: ${COPILOT_ENABLED:true}
    priority: 2
    base_url: "http://127.0.0.1:8141/v1"
    models:
      - gpt-4
      - gpt-4-turbo
      - gpt-4o
      - gpt-4o-mini
      - gpt-5
      - gpt-5.1
      - gpt-5.2
      - o1
      - o1-mini
      - o1-preview
      - o3
      - o3-mini
    timeout: 120
    stream_timeout: 600
    max_retries: 3

  # Kiro Gateway 后端 - 第三方网关（可选）
  # [FIX 2026-02-26] 更新模型列表为实际支持的模型（移除不支持的 Opus 系列）
  kiro-gateway:
    enabled: ${KIRO_GATEWAY_ENABLED:true}
    priority: 2
    base_url: ${KIRO_GATEWAY_ENDPOINT:http://127.0.0.1:9876/v1}
    models:
      - claude-sonnet-4.5
      - claude-sonnet-4
      - claude-haiku-4.5
      - deepseek-3.2
      - minimax-m2.1
      - qwen3-coder-next
    timeout: 180
    stream_timeout: 900
    max_retries: 2

  # Ruoli API 后端 - 公益站 Claude API (OpenAI 格式)
  # 优先级在 Kiro 之后，AnyRouter 之前（公益站顺序）
  ruoli:
    enabled: ${RUOLI_ENABLED:true}
    priority: 3
    base_url: ${RUOLI_ENDPOINT:https://api.ruoli.dev/v1}
    api_key: ${RUOLI_API_KEY:}  # ⚠️ 必须通过环境变量配置，不要硬编码！
    models:
      - claude-sonnet-4.5
      - claude-opus-4.5
    timeout: 120
    stream_timeout: 600
    max_retries: 2

  # ==================== [DISABLED 2026-02-15] newAPI 系公益站 ====================
  # DKAPI/Cifang API Keys 已失效，待上游恢复后取消注释即可重新启用
  # dkapi:
  #   enabled: ${DKAPI_ENABLED:true}
  #   priority: 3.2
  #   base_url: ${DKAPI_ENDPOINT:https://api.dkjsiogu.me/v1}
  #   api_key: ${DKAPI_API_KEY:}
  #   models:
  #     - claude-opus-4.6
  #     - claude-opus-4.5
  #     - claude-sonnet-4.5
  #     - claude-haiku-4.5
  #   timeout: 120
  #   stream_timeout: 600
  #   max_retries: 2

  # cifang:
  #   enabled: ${CIFANG_ENABLED:true}
  #   priority: 3.4
  #   base_url: ${CIFANG_ENDPOINT:https://cifang.xyz/v1}
  #   api_key: ${CIFANG_API_KEY:}
  #   models:
  #     - claude-opus-4.6
  #     - claude-opus-4.5
  #     - claude-sonnet-4.5
  #     - claude-haiku-4.5
  #   timeout: 120
  #   stream_timeout: 600
  #   max_retries: 2
  # ==========================================================================

  # AnyRouter 后端 - 公益站多模型路由
  # 优先级在 Ruoli 之后（公益站顺序）
  anyrouter:
    enabled: ${ANYROUTER_ENABLED:true}
    priority: 4
    base_url: ${ANYROUTER_ENDPOINT:https://api.anyrouter.cc/v1}
    api_key: ${ANYROUTER_API_KEY:}  # 需要配置 API Key
    models:
      - claude-sonnet-4.5
      - claude-opus-4.5
      - claude-haiku-4.5
      - claude-sonnet-4
      - gpt-4
      - gpt-4o
    timeout: 120
    stream_timeout: 600
    max_retries: 2

# ==================== 模型特定路由规则 ====================
#
# 配置说明：
# - 为特定模型配置优先级后端链
# - backends: 按优先级排序的后端列表（第一个优先）
#   - 格式可以是:
#     - 字符串: "backend_name" (使用请求中的原始模型)
#     - 对象: {backend: "backend_name", model: "target_model"} (指定目标模型)
# - fallback_on: 触发降级到下一个后端的条件
#   - HTTP 状态码（如 429, 503）
#   - 特殊条件：timeout, connection_error, unavailable
# - enabled: 是否启用此路由规则（默认 true）
#
# 完整降级链示例 (claude-sonnet-4.5):
# ⚠️ 注意：Sonnet 4.5 有硬编码优先级规则，第一优先级是 kiro-gateway！
# kiro(4.5) -> gcli2api-antigravity(4.5) -> ruoli(4.5) -> anyrouter(4.5) -> copilot(4.5) -> copilot(4) -> gcli2api-antigravity(gemini-3-flash)
# 硬编码规则（不受 YAML 影响）→ kiro 优先 → gcli2api-antigravity → 公益站链路（ruoli → anyrouter）→ copilot 兜底
#
model_routing:
  # Claude Sonnet 4.5 完整降级链
  # ✅ [FIX 2026-02-06] Antigravity → Antigravity Tools → Ruoli → AnyRouter → Kiro → Copilot → Gemini
  # 当自研后端凭证不可用时，完整降级条件触发 fallback 到 antigravity-tools
  claude-sonnet-4.5:
    enabled: ${SONNET45_KIRO_FIRST:true}
    backends:
      # 1. Antigravity - Claude Sonnet 4.5（首选自研后端）
      - backend: gcli2api-antigravity
        model: claude-sonnet-4.5
      # 2. 🆕 Antigravity Tools - Claude Sonnet 4.5（自研后端凭证不可用时 fallback）
      - backend: antigravity-tools
        model: claude-sonnet-4-5-20250514
      # 3. Ruoli API - Claude Sonnet 4.5（公益站第一选择）
      - backend: ruoli
        model: claude-sonnet-4.5
      # [DISABLED 2026-02-15] DKAPI/Cifang API Keys 已失效
      # - backend: dkapi
      #   model: claude-sonnet-4.5
      # - backend: cifang
      #   model: claude-sonnet-4.5
      # 4. AnyRouter - Claude Sonnet 4.5（公益站第二选择）
      - backend: anyrouter
        model: claude-sonnet-4.5
      # 5. Kiro Gateway - Claude Sonnet 4.5
      - backend: kiro-gateway
        model: claude-sonnet-4.5
      # 6. Copilot - Claude Sonnet 4.5
      - backend: copilot
        model: claude-sonnet-4.5
      # 7. Copilot - Claude Sonnet 4 (降级到 4.0)
      - backend: copilot
        model: claude-sonnet-4
      # 8. Antigravity - Gemini 3 Pro High (跨池降级)
      - backend: gcli2api-antigravity
        model: gemini-3-pro-high
    fallback_on:
      - 403             # 权限错误 / 人机验证
      - 429             # 配额耗尽 / 速率限制
      - 500             # 服务器内部错误
      - 502             # 网关错误
      - 503             # 服务不可用
      - 504             # 网关超时
      - timeout         # 请求超时
      - connection_error # 连接失败
      - unavailable     # 后端不可用

  # Claude Opus 4.5 完整降级链
  # ✅ [FIX 2026-01-25] Antigravity (硬编码首选) → Ruoli → AnyRouter → Kiro → Copilot → Gemini Pro High
  # ✅ [FIX 2026-02-02] 跨池降级目标改为 gemini-3-pro-high，与 fallback_manager 一致
  # ⚠️ 硬编码规则：Opus 4.5 优先使用 Antigravity（见 src/gateway/routing.py Line 244-249）
  # ✅ [FIX 2026-02-02] Kiro Gateway 移到 Copilot 前面，优先尝试免费后端
  claude-opus-4.5:
    enabled: ${OPUS45_ANTIGRAVITY_FIRST:true}
    backends:
      # [REMOVED 2026-02-20] ZeroGravity 上游 v1.2.0 已 sunset opus-4.5
      # 1. Antigravity - Claude Opus 4.5（硬编码首选，成本最低）
      - backend: gcli2api-antigravity
        model: claude-opus-4.5
      # 2. 🆕 Antigravity Tools - Claude Opus 4.5（自研后端 429/403 时 fallback）
      - backend: antigravity-tools
        model: claude-opus-4.5
      # 3. Ruoli API - Claude Opus 4.5（公益站第一选择）
      - backend: ruoli
        model: claude-opus-4.5
      # [DISABLED 2026-02-15] DKAPI/Cifang API Keys 已失效
      # - backend: dkapi
      #   model: claude-opus-4.5
      # - backend: cifang
      #   model: claude-opus-4.5
      # 4. AnyRouter - Claude Opus 4.5（公益站第二选择）
      - backend: anyrouter
        model: claude-opus-4.5
      # [REMOVED 2026-02-26] Kiro Gateway 不支持 Opus 模型，已从降级链移除
      # 6. Copilot - Claude Opus 4.5（首选付费后端）
      - backend: copilot
        model: claude-opus-4.5
      # 7. Copilot - Claude Sonnet 4.5 (降级到 Sonnet)
      - backend: copilot
        model: claude-sonnet-4.5
      # 8. Copilot - Claude Sonnet 4
      - backend: copilot
        model: claude-sonnet-4
      # 9. Antigravity - Gemini 3 Flash (跨池最终降级)
      - backend: gcli2api-antigravity
        model: gemini-3-flash
    fallback_on:
      - 403  # ✅ [FIX 2026-02-03] 添加 403 权限错误（触发凭证切换）
      - 429
      - 500
      - 502
      - 503
      - 504  # ✅ [FIX 2026-02-03] 添加 504 网关超时
      - timeout
      - connection_error
      - unavailable

  # ✅ [FIX 2026-01-25] Claude Opus 4-5 (映射后的格式，支持 Cursor 客户端)
  # Cursor 发送的模型名：claude-4.5-opus-high-thinking
  # 映射后的模型名：claude-opus-4-5-thinking
  # 此配置确保映射后的模型名称也能正确路由
  # ✅ [FIX 2026-02-02] Kiro Gateway 移到 Copilot 前面，优先尝试免费后端
  claude-opus-4-5:
    enabled: ${OPUS45_ANTIGRAVITY_FIRST:true}
    backends:
      # [REMOVED 2026-02-20] ZeroGravity 上游 v1.2.0 已 sunset opus-4.5
      # 1. Antigravity - Claude Opus 4-5（硬编码首选，成本最低）
      - backend: gcli2api-antigravity
        model: claude-opus-4-5-thinking
      # 2. 🆕 Antigravity Tools - Claude Opus 4-5（自研后端 429/403 时 fallback）
      - backend: antigravity-tools
        model: claude-opus-4-5-20251101
      # 3. Ruoli API - Claude Opus 4-5（公益站第一选择）
      - backend: ruoli
        model: claude-opus-4-5
      # [DISABLED 2026-02-15] DKAPI/Cifang API Keys 已失效
      # - backend: dkapi
      #   model: claude-opus-4-5
      # - backend: cifang
      #   model: claude-opus-4-5
      # 4. AnyRouter - Claude Opus 4-5（公益站第二选择）
      - backend: anyrouter
        model: claude-opus-4-5
      # [REMOVED 2026-02-26] Kiro Gateway 不支持 Opus 模型，已从降级链移除
      # 5. Kiro Gateway - Claude Opus 4-5（在 Copilot 前尝试）
      # - backend: kiro-gateway
      #   model: claude-opus-4-5-20250514
      # 6. Copilot - Claude Opus 4-5（首选付费后端）
      - backend: copilot
        model: claude-opus-4-5
      # 7. Copilot - Claude Sonnet 4-5 (降级到 Sonnet)
      - backend: copilot
        model: claude-sonnet-4-5
      # 7. Copilot - Claude Sonnet 4
      - backend: copilot
        model: claude-sonnet-4
      # 8. Antigravity - Gemini 3 Pro High (跨池降级，与 fallback_manager 一致)
      # ✅ [FIX 2026-02-02] 改为 gemini-3-pro-high，与 CLAUDE_TO_GEMINI_FALLBACK 对齐
      - backend: gcli2api-antigravity
        model: gemini-3-pro-high
    fallback_on:
      - 403  # ✅ [FIX 2026-02-03] 添加 403 权限错误（触发凭证切换）
      - 429
      - 500
      - 502
      - 503
      - 504  # ✅ [FIX 2026-02-03] 添加 504 网关超时
      - timeout
      - connection_error
      - unavailable

  # ==================== [NEW 2026-02-06] Claude Opus 4.6 降级链 ====================
