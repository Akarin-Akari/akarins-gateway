    fallback_on:
      - 400
      - 403
      - 404
      - 429
      - 500
      - 502
      - 503
      - 504
      - timeout
      - connection_error
      - unavailable
  # ======================================================================================

  # ==================== [NEW 2026-02-21] ZeroGravity 模型路由规则 ====================
