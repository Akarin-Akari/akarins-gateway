  # ==================== End of ZeroGravity 模型路由规则 ====================

  # Claude Haiku 4.5 降级链 (轻量模型)
  # ✅ [FIX 2026-01-24] Haiku 排除 Antigravity（与旧网关一致）
  # ✅ [FIX 2026-02-02] 默认启用，优先 Kiro，避免 Copilot 被随意启用
  # ⚠️ Antigravity 不支持 Haiku 模型，直接走 Kiro → AnyRouter → Copilot 链路
  claude-haiku-4.5:
    enabled: ${HAIKU45_KIRO_FIRST:true}
    backends:
      # 1. Kiro Gateway - Claude Haiku 4.5（首选）
      - backend: kiro-gateway
        model: claude-haiku-4.5
      # ❌ 移除 Antigravity（不支持 Haiku）
      # [DISABLED 2026-02-15] DKAPI/Cifang API Keys 已失效
      # - backend: dkapi
      #   model: claude-haiku-4.5
      # - backend: cifang
      #   model: claude-haiku-4.5
      # 4. AnyRouter - Claude Haiku 4.5（公益站）
      - backend: anyrouter
        model: claude-haiku-4.5
      # 5. Copilot - Claude Haiku 4.5
      - backend: copilot
        model: claude-haiku-4.5
      # 4. Antigravity - Gemini 3 Flash（跨池最终降级）
      - backend: gcli2api-antigravity
        model: gemini-3-flash
    fallback_on:
      - 429
      - 500  # ✅ [FIX 2026-02-03] 添加 500 内部服务器错误
      - 502
      - 503
      - 504  # ✅ [FIX 2026-02-03] 添加 504 网关超时
      - timeout
      - connection_error
      - unavailable


# ==================== Phase B: Data-Driven Routing Configuration ====================
# [REFACTOR 2026-02-21] 将所有硬编码路由规则迁移至 YAML 配置
# 使路由系统完全数据驱动：新增/调整模型只需改 YAML
# 优先级解析顺序：
#   1. model_routing (显式模型规则) — 不变
#   2. default_routing.rules (模式匹配规则) — 替代 routing.py Steps 1-5
#   3. default_routing.catch_all — 替代 Step 5 else 分支
#   4. cross_model_fallback (跨模型降级) — 替代 proxy.py 末尾逻辑
#   5. final_fallback (绝对最终兜底) — 替代 proxy.py Copilot 兜底
# ===================================================================================


# ==================== 1. Backend Capabilities (后端能力声明) ====================
# 替代 is_antigravity_supported()、is_kiro_gateway_supported()、ANTIGRAVITY_SUPPORTED_PATTERNS
# 使用 fnmatch 模式匹配（支持 * 和 ? 通配符）
# 4.5/4-5 和 4.6/4-6 归一化由模式匹配引擎自动处理

backend_capabilities:
  zerogravity:
    include_patterns:
      - "claude-opus-4.6*"
      - "claude-opus-4-6*"
      - "claude-sonnet-4.6*"
      - "claude-sonnet-4-6*"
      - "gemini-3.1-*"
      - "gemini-3-flash*"

  gcli2api-antigravity:
    include_patterns:
      # Gemini 2.5 系列
      - "gemini-2.5-*"
      - "gemini-2-5-*"
      # Gemini 3 系列
      - "gemini-3-*"
      # Claude 4.5 Sonnet/Opus（排除 Haiku — Haiku 不走 AG）
      - "claude-sonnet-4.5*"
      - "claude-sonnet-4-5*"
      - "claude-opus-4.5*"
      - "claude-opus-4-5*"
      # Claude 4.6 Opus
      - "claude-opus-4.6*"
      - "claude-opus-4-6*"
      # [FIX 2026-03-10] Claude 4.6 Sonnet（冷启动窗口内 YAML 兜底）
      - "claude-sonnet-4.6*"
      - "claude-sonnet-4-6*"
      # GPT 4/5 系列
      - "gpt-4*"
      - "gpt-5*"
      # GPT OOS
      - "gpt-oos*"
    exclude_patterns:
      - "*haiku*"      # Haiku 不走 Antigravity
      - "gpt-3.5*"     # GPT 3.5 不支持
      - "gpt-3*"       # GPT 3 不支持

  antigravity-tools:
    include_patterns:
      # Claude 4.6 系列
      - "claude-opus-4.6*"
      - "claude-opus-4-6*"
      # [FIX 2026-03-10] Claude 4.6 Sonnet（冷启动窗口内 YAML 兜底）
      - "claude-sonnet-4.6*"
      - "claude-sonnet-4-6*"
      # Claude 4.5 系列（主要目标）
      - "claude-opus-4.5*"
      - "claude-opus-4-5*"
      - "claude-sonnet-4.5*"
      - "claude-sonnet-4-5*"
      # Gemini 2.5 系列
      - "gemini-2.5-*"
      - "gemini-2-5-*"
      # Gemini 3 系列
      - "gemini-3-*"
      # GPT 系列
      - "gpt-4*"
      - "gpt-5*"
    exclude_patterns:
      - "*haiku*"
      - "gpt-3.5*"

  # [FIX 2026-02-26] 更新 kiro-gateway 能力声明，移除不支持的 Opus 系列
  # 实际支持: claude-sonnet-4.5, claude-sonnet-4, claude-haiku-4.5, deepseek-3.2, minimax-m2.1, qwen3-coder-next
  kiro-gateway:
    include_patterns:
      # Claude Sonnet 4.5
      - "claude-sonnet-4.5*"
      - "claude-sonnet-4-5*"
      # Claude Haiku 4.5
      - "claude-haiku-4.5*"
      - "claude-haiku-4-5*"
      # Claude Sonnet 4（非 4.5）
      - "claude-sonnet-4"
      # DeepSeek / MiniMax / Qwen 系列
      - "deepseek-3.2*"
      - "minimax-m2.1*"
      - "qwen3-coder*"
    exclude_patterns:
      - "*opus*"     # Kiro 不支持任何 Opus 模型

  copilot:
    include_patterns:
      - "*"    # 兜底，接受所有模型


# ==================== 2. Default Routing (默认路由链) ====================
# 替代 routing.py get_backend_and_model_for_routing() Steps 1-5
# 规则按顺序匹配，第一个匹配的规则生效
# chain 中的后端按顺序尝试，第一个可用且支持该模型的后端被选中
# fallback_on 定义触发降级到下一个后端的条件
# 注意：model_routing 显式规则优先级高于 default_routing

default_routing:
  rules:
    # ---- Haiku 系列 → Kiro 优先（Antigravity 不支持 Haiku） ----
    - pattern: "claude-*haiku*"
      chain:
        - backend: kiro-gateway
        - backend: anyrouter
        - backend: copilot
      fallback_on: [429, 500, 502, 503, 504, timeout, connection_error]

    # ---- Opus 4.6 → ZeroGravity 优先（最高优先级 MITM） ----
    # [FIX 2026-02-26] 移除 kiro-gateway（不支持 Opus）
    - pattern: "claude-*opus*4.6*"
      chain:
        - backend: zerogravity
        - backend: gcli2api-antigravity
        - backend: antigravity-tools
        - backend: copilot
      fallback_on: [400, 403, 404, 429, 500, 502, 503, 504, timeout, connection_error]

    # ---- Sonnet 4.6 → ZeroGravity 优先 ----
    # [FIX 2026-02-26] 移除 kiro-gateway（不支持 Sonnet 4.6）
    - pattern: "claude-*sonnet*4.6*"
      chain:
        - backend: zerogravity
        - backend: gcli2api-antigravity
        - backend: antigravity-tools
        - backend: copilot
      fallback_on: [400, 403, 404, 429, 500, 502, 503, 504, timeout, connection_error]

    # ---- Opus 4.5 → Antigravity 优先 ----
    # [FIX 2026-02-26] 移除 kiro-gateway（不支持 Opus）
    - pattern: "claude-*opus*4.5*"
      chain:
        - backend: gcli2api-antigravity
        - backend: antigravity-tools
        - backend: copilot
      fallback_on: [403, 429, 500, 502, 503, 504, timeout, connection_error]

    # ---- Sonnet 4.5 → Kiro 优先（与现有 Step 1 一致） ----
    - pattern: "claude-*sonnet*4.5*"
      chain:
        - backend: kiro-gateway
        - backend: gcli2api-antigravity
        - backend: antigravity-tools
        - backend: copilot
      fallback_on: [403, 429, 500, 502, 503, 504, timeout, connection_error]

    # ---- 其他 Claude Sonnet（如 sonnet-4）→ Antigravity 优先 ----
    - pattern: "claude-*sonnet*"
      chain:
        - backend: gcli2api-antigravity
        - backend: antigravity-tools
        - backend: kiro-gateway
        - backend: copilot
      fallback_on: [403, 429, 500, 502, 503, 504, timeout, connection_error]

    # ---- Gemini 系列 → ZeroGravity 优先 ----
    - pattern: "gemini-*"
      chain:
        - backend: zerogravity
        - backend: gcli2api-antigravity
        - backend: antigravity-tools
      fallback_on: [403, 429, 500, 502, 503, timeout, connection_error]

    # ---- GPT 系列 → Antigravity 优先 ----
    - pattern: "gpt-*"
      chain:
        - backend: gcli2api-antigravity
        - backend: antigravity-tools
        - backend: copilot
      fallback_on: [429, 500, 502, 503, timeout, connection_error]

    # ---- O1/O3/O4 系列 → Copilot 直通 ----
    - pattern: "o1*"
      chain:
        - backend: copilot
      fallback_on: [429, 500, 502, 503]

    - pattern: "o3*"
      chain:
        - backend: copilot
      fallback_on: [429, 500, 502, 503]

    - pattern: "o4*"
      chain:
        - backend: copilot
      fallback_on: [429, 500, 502, 503]

    # ---- 中国国产模型 → kiro-gateway 优先 ----
    # [FIX 2026-03-10] DeepSeek/MiniMax/Qwen 等非 Claude 模型路由到 kiro-gateway
    - pattern: "deepseek*"
      chain:
        - backend: kiro-gateway
      fallback_on: [429, 500, 502, 503, 504, timeout, connection_error]

    - pattern: "minimax*"
      chain:
        - backend: kiro-gateway
      fallback_on: [429, 500, 502, 503, 504, timeout, connection_error]

    - pattern: "qwen*"
      chain:
        - backend: kiro-gateway
      fallback_on: [429, 500, 502, 503, 504, timeout, connection_error]

  # 兜底规则：未匹配任何 pattern 时使用
  # [FIX 2026-03-10] 加入 kiro-gateway 作为防御性兜底
  catch_all:
    chain:
      - backend: gcli2api-antigravity
      - backend: antigravity-tools
      - backend: kiro-gateway
      - backend: copilot
    fallback_on: [429, 500, 502, 503, 504, timeout, connection_error]


# ==================== 3. Cross-Model Fallback (跨模型降级) ====================
# 替代 proxy.py 跨模型降级逻辑 + fallback_manager.py CLAUDE_TO_GEMINI_FALLBACK
# 当某模型在所有后端都失败后，尝试切换到不同模型
# 注意：触发条件由 proxy.py 的 enable_cross_pool_fallback 控制

cross_model_fallback:
  enabled: true
  rules:
    - pattern: "claude-*opus*"
      fallback_model: gemini-3-pro-high
      backend: gcli2api-antigravity
    - pattern: "claude-*sonnet*"
      fallback_model: gemini-3-pro-high
      backend: gcli2api-antigravity
    - pattern: "claude-*haiku*"
      fallback_model: gemini-3-flash
      backend: gcli2api-antigravity
    - pattern: "gpt-oos*"
      fallback_model: gemini-3-pro-high
      backend: gcli2api-antigravity
    # 默认降级目标
    - pattern: "*"
      fallback_model: gemini-3-pro-high
      backend: gcli2api-antigravity


# ==================== 4. Copilot Model Mapping (Copilot 模型名映射) ====================
# 替代 config.py COPILOT_MODEL_MAPPING 中的显式映射条目
# 模糊匹配逻辑（Claude/GPT/Gemini 家族推断）保留在 Python 的 map_model_for_copilot() 中

copilot_model_mapping:
  # Claude Haiku 系列 → claude-haiku-4.5
  claude-3-haiku: claude-haiku-4.5
  claude-3.5-haiku: claude-haiku-4.5
  claude-haiku-3: claude-haiku-4.5
  claude-haiku-3.5: claude-haiku-4.5
  claude-haiku: claude-haiku-4.5

  # Claude Sonnet 系列
  claude-3-sonnet: claude-sonnet-4
  claude-3.5-sonnet: claude-sonnet-4
  claude-sonnet-3: claude-sonnet-4
  claude-sonnet-3.5: claude-sonnet-4
  claude-sonnet: claude-sonnet-4

  # Claude 4 系列
  claude-4-sonnet: claude-sonnet-4
  claude-sonnet-4: claude-sonnet-4
  claude-4.5-sonnet: claude-sonnet-4.5
  claude-sonnet-4.5: claude-sonnet-4.5

  claude-4-opus: claude-opus-4.5
  claude-opus-4: claude-opus-4.5
  claude-4.5-opus: claude-opus-4.5
  claude-opus-4.5: claude-opus-4.5

  claude-4-haiku: claude-haiku-4.5
  claude-haiku-4: claude-haiku-4.5
  claude-4.5-haiku: claude-haiku-4.5
  claude-haiku-4.5: claude-haiku-4.5

  # Claude Opus 4.6 系列
  claude-4.6-opus: claude-opus-4.6
  claude-4-6-opus: claude-opus-4.6
  claude-opus-4.6: claude-opus-4.6
  claude-opus-4-6: claude-opus-4.6

  # GPT 系列
  gpt-4-turbo: gpt-4-0125-preview
  gpt-4-turbo-preview: gpt-4-0125-preview
  gpt-4o-latest: gpt-4o
  gpt-4o-mini-latest: gpt-4o-mini

  # Gemini 系列
  gemini-2.5-pro-latest: gemini-2.5-pro
  gemini-2.5-pro-preview: gemini-2.5-pro
  gemini-3-pro: gemini-3-pro-high
  gemini-3-pro-preview: gemini-3-pro-high
  gemini-3-flash: gemini-3-flash
  gemini-3-flash-preview: gemini-3-flash


# ==================== 5. Final Fallback (最终兜底) ====================
# 替代 proxy.py 硬编码 Copilot 兜底逻辑
# 当所有路由链和跨模型降级都失败时，最终尝试 Copilot

final_fallback:
  enabled: true
  backend: copilot
  respect_circuit_breaker: true
