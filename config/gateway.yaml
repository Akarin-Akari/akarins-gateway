      - unavailable

  # Gemini 3.1 Pro 降级链
  gemini-3.1-pro:
    enabled: true
    backends:
      - backend: zerogravity
        model: gemini-3.1-pro
      - backend: gcli2api-antigravity
        model: gemini-3.1-pro
    fallback_on:
      - 403
      - 429
      - 500
      - 502
      - 503
      - timeout
      - connection_error
      - unavailable

  # Gemini 3.1 Pro High 降级链
  gemini-3.1-pro-high:
