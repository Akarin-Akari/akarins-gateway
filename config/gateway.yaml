      # [DISABLED 2026-02-15] DKAPI/Cifang API Keys 已失效
      # - backend: dkapi
      #   model: claude-opus-4-5
      # - backend: cifang
      #   model: claude-opus-4-5
      - backend: anyrouter
        model: claude-opus-4-5
      # [REMOVED 2026-02-26] Kiro Gateway 不支持 Opus，已从降级链移除
      # - backend: kiro-gateway
      #   model: claude-opus-4-5-20250514
      # Copilot - 先尝试 Opus 4.6（已支持）
      - backend: copilot
        model: claude-opus-4-6
      # Copilot - 降级到 Opus 4.5
      - backend: copilot
        model: claude-opus-4-5
      # ========== Phase 3: 跨模型降级 ==========
      - backend: copilot
        model: claude-sonnet-4-5
      # Kiro Gateway - Claude Sonnet 4（比 Copilot 便宜）
      - backend: kiro-gateway
        model: claude-sonnet-4
      # Kiro Gateway - Claude Haiku 4.5（轻量快速）
      - backend: kiro-gateway
        model: claude-haiku-4-5
      # Copilot - Claude Haiku 4.5
      - backend: copilot
        model: claude-haiku-4-5
      - backend: gcli2api-antigravity
