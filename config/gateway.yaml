      # Phase 4: 降级到 Sonnet 4.5
      - backend: gcli2api-antigravity
        model: claude-sonnet-4.5
      - backend: kiro-gateway
        model: claude-sonnet-4.5
      - backend: copilot
        model: claude-sonnet-4.5
    fallback_on:
      - 403
      - 429
      - 500
      - 502
      - 503
      - 504
      - timeout
      - connection_error
      - unavailable

  # Claude Sonnet 4-6 (带连字符格式)
  claude-sonnet-4-6:
    enabled: true
    backends:
      - backend: zerogravity
        model: claude-sonnet-4-6
      - backend: gcli2api-antigravity
        model: claude-sonnet-4-6
      - backend: antigravity-tools
        model: claude-sonnet-4-6
      - backend: ruoli
        model: claude-sonnet-4-6
      - backend: anyrouter
        model: claude-sonnet-4-6
      - backend: gcli2api-antigravity
        model: claude-sonnet-4-5
      - backend: kiro-gateway
        model: claude-sonnet-4-5
      - backend: copilot
        model: claude-sonnet-4-5
    fallback_on:
      - 403
      - 429
      - 500
      - 502
      - 503
      - 504
      - timeout
      - connection_error
      - unavailable

  # Gemini 3 Flash 降级链
  gemini-3-flash:
